<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style222.css">
</head>
<body>
    <div>
        <button class="con">BIN</button>
        <button class="con1">OCT</button>
        <button class="con2">HEX</button>
    </div>
    <div class="cal">
    <input  type="text" placeholder="0" id="inputbox">
    
    <div class="box">
        <button class="i1">AC</button>
        <button class="i1">DEL</button>
        <button class="i1">%</button>
        <button class="i1">/</button>
    </div>
     <div class="box">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="i1">*</button>
    </div>
     <div class="box">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="i1">-</button>
    </div>
     <div class="box">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="i1">+</button>
    </div>
     <div class="box">
        <button>00</button>
        <button>0</button>
        <button class="i1">.</button>
        <button id="equal">=</button>
    </div>
    </div>
    <script src="cal.js"></script>
</body>

</html>
